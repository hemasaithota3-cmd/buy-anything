<!DOCTYPE html>
<html>
<head>
    <title>Navbar with Products</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f5f5f5; }

        /* NAVBAR */
        .navbar {
            background-color: #333;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .navbar a { color: white; text-decoration: none; margin-right: 20px; }
        .navbar input { padding: 6px; border-radius: 4px; border: none; margin-left: auto; margin-right: 10px; width: 150px; }
        .navbar button { background-color: red; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .navbar img { width: 45px; margin-right: 15px; }

        /* CONTAINER */
        .container { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }

        /* PRODUCT CARD */
        .product {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 2px solid #ddd;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 0 0 250px;
            height: 420px;
        }
        .product img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px; }
        .product h1 { font-size: 16px; margin: 10px 0; flex-grow: 1; }
        .product button { background: linear-gradient(to right, #ff9800, #ff5722); color: white; border: none; padding: 10px; border-radius: 25px; cursor: pointer; width: 100%; }
        .product button:hover {
            background-color: #ddd;
            color: #ff5722;
        }

        @media (max-width: 1024px) {
            .product { flex: 0 0 calc(33.333% - 20px); max-width: calc(33.333% - 20px); }
        }

        @media (max-width: 768px) {
            .container { gap: 15px; padding: 15px; }
            .product { flex: 0 0 calc(50% - 15px); max-width: calc(50% - 15px); height: auto; padding: 12px; }
            .product img { height: 130px; }
            .product h1 { font-size: 15px; }
            .navbar { justify-content: center; }
            .navbar input { width: 100%; order: 3; margin: 10px 0; }
            .navbar button { margin: 5px; }
        }

        @media (max-width: 480px) {
            .product { flex: 0 0 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="{{ url_for('static', filename='images/OIP.jpg') }}?v=1" alt="logo">
        <a href="/">Home</a>
        {% if session.get('is_admin') == 1 %}
        <a href="/admin" style="background-color: #ff9800; color: white; padding: 6px 12px; border-radius: 4px; border: none; font-weight: bold;">Admin Dashboard</a>
        {% endif %}
        <input type="text" placeholder="Search..." id="searchinput" onkeyup="searchitem()">
        <button onclick="logoutUser()">Logout</button>
        <button type="button" onclick="location.href='/cart'">🛒 My Cart</button>
    </div>

    <div class="container">
        {% for product in products %}
        <div class="product">
            {% if 'http' in product.image_url %}
            <img src="{{ product.image_url }}" alt="{{ product.name }}">
            {% else %}
            <img src="{{ url_for('static', filename=product.image_url) }}?v=1" alt="{{ product.name }}">
            {% endif %}
            
            <h1><i>{{ product.name }}<br>₹{{ product.price }}</i></h1>
            <h6>{{ product.description }}</h6>
            <button class="add-to-cart" data-name="{{ product.name }}" data-price="{{ product.price }}">Add to Cart</button>
        </div>
        {% else %}
        <p style="text-align:center; width: 100%;">No products found in the store.</p>
        {% endfor %}
    </div>

    <script>
        // Search function
        function searchitem(){
            let input = document.getElementById("searchinput").value.toLowerCase();
            let items = document.querySelectorAll(".product");
            items.forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(input) ? "" : "none";
            });
        }

        // Load cart from localStorage
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const buttons = document.querySelectorAll(".add-to-cart");

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                const name = btn.dataset.name;
                const price = Number(btn.dataset.price);
                let existingItem = cart.find(item => item.name === name);
                if (existingItem) existingItem.quantity += 1;
                else cart.push({name, price, image: btn.closest(".product").querySelector("img").src, quantity: 1});
                localStorage.setItem("cart", JSON.stringify(cart));
                alert(name + " added to cart!");
            });
        });

        function logoutUser() {
            localStorage.removeItem("cart");
            window.location.href = "/logout";
        }
    </script>
</body>
</html>
